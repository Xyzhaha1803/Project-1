<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarlyBird Puzzle</title>
    <link rel="stylesheet" href="../Style/Memory.css">
</head>

<body>
    <main>

        <!-- Memory game -->
        <section id="game-memory">
            <div class="GameHeader">
                <h2 class="GameTitle">Memory Game</h2>
                <div class="GameControls">
                    <span class="GameStat">Moves: <b id="memoryMoves">0</b></span>
                    <span class="GameStat">Matches: <b id="memoryMatches">0</b></span>
                    <button class="ResetButton" id="memoryReset">Restart</button>
                    <button class="BackButton" id="backTo">Back</button>
                </div>
            </div>
            <div class="MemoryGrid" id="memoryGrid"></div>
            <div class="WinBanner" id="memoryWin">
                <p>You won! With <b id="memoryWinMoves">0</b> moves! In <b id="memoryWinMatches">0</b> matches!</p>
                <button class="ResetButton" id="memoryWinReset">Play Again</button>
            </div>
        </section>
    </main>

    <script src="../JS/Memory.js"></script>
</body>

</html>
