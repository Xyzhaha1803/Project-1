<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EarlyBird Chess</title>
        <link rel="stylesheet" href="../Style/Chess.css">
    </head>

    <body>
        <main>

            <!-- Chess game -->
            <section id="game-chess">
                <div class="GameHeader">
                    <h2 class="GameTitle">Chess</h2>
                    <div class="GameControls">
                        <span class="GameStat" id="chessTurn">White's turn</span>
                        <button class="ResetButton" id="chessReset">Restart</button>
                        <button class="BackButton" id="backTo">Back</button>
                    </div>
                </div>
                <div class="ChessWrap">
                    <div class="ChessBoard" id="chessBoard"></div>
                </div>
                <p class="ChessHint" id="chessStatus">Click any piece to select it, then click a square for it to move onto.</p>
                <p class="ChessTutorial">Don't know how to play chess?<a href="https://www.youtube.com/watch?v=YdnvlntAQH8" target="_blank"> Watch this video!</a></p>

                <div class="WinBanner" id="chessWinBanner">
                <p>Chess Match finished! Winner:<b id="chessWinner"></b> </p>
                <button class="ResetButton" id="chessWinReset">Play Again!</button>
            </div>
            </section>

        </main>

        <script src="../JS/Chess.js"></script>
    </body>
</html>
